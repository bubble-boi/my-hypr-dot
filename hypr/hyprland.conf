### DISPLAY ###
monitor = DSI-1, preffered, auto, 1, transform,3
layerrule = blur, wofi

layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blurpopups, waybar

layerrule = blur, python3
layerrule = ignorezero, python3
layerrule = blurpopups, python3

### PROGRAM ###
$terminal = kitty
$fileManager =
$lock = hyprlock
$launcher = wofi-launcher
$clipboard = wofi-clipboard
$tool = wofi-tools
$powerprofilesctl = wofi-powerprofilesctl

### AUTOSTART ###
exec-once = fcitx5 -d &
exec-once = hyprpaper &
exec-once = waybar &
exec-once = hypridle &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular

### ENVIRONMENT VARIABLES ###
env = PATH,$HOME/.local/bin:$HOME/.local/bin/my-hypr-bin:/usr/local/bin:/usr/bin

### LOOK AND FEEL ###
general {
    border_size = 2
    gaps_in = 0, 0, 5, 5
    gaps_out = 0, 10, 10u, 10
    col.inactive_border = rgba(E0E0E0FF)
    col.active_border = rgba(E0E0E0FF)
    layout = dwindle
    resize_on_border = true
    snap {
        enabled = false
    }
}

decoration {
    rounding = 0
    rounding_power = 0
    blur {
        enabled = yes
        size = 5
        passes = 5
        #xray = yes
        noise = 0.03
        contrast = 1
        brightness = 0.4
        vibrancy = 0
        vibrancy_darkness = 0
    }
    shadow {
        enabled = yes
        sharp = yes
        range = 1
    }
}

animations {
    enabled = no
}

input {
    kb_model =6
    kb_layout = us
    kb_variant =
    kb_options = F10:nocaps
    kb_rules =
    kb_file =
    sensitivity = 1
    accel_profile = adaptive
    left_handed = false
    natural_scroll = true
    scroll_factor = 1
    follow_mouse = 1
    focus_on_close = 0
    mouse_refocus = false
    special_fallthrough = true
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

device {
    name = xxxx0000:05-0911:5288-touchpad
    sensitivity = 0.8
    natural_scroll = true
    disable_while_typing = no
}


### KEYBINDINGS ###
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, togglefloating,
bind = $mainMod, R, exec, $launcher
bind = $mainMod, U, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, V, exec, $clipboard
bind = $mainMod, L, exec, $lock
bind = $mainMod, B, exec, $tool
bind = $mainMod, P, exec, $powerprofilesctl
bind = CTRL+ALT, DELETE, exec, $power

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod_SHIFT, 1, movetoworkspace, 1
bind = $mainMod_SHIFT, 2, movetoworkspace, 2
bind = $mainMod_SHIFT, 3, movetoworkspace, 3
bind = $mainMod_SHIFT, 4, movetoworkspace, 4
bind = $mainMod_SHIFT, 5, movetoworkspace, 5
bind = $mainMod_SHIFT, 6, movetoworkspace, 6
bind = $mainMod_SHIFT, 7, movetoworkspace, 7
bind = $mainMod_SHIFT, 9, movetoworkspace, 9
bind = $mainMod_SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, D, workspace, e+1
bind = $mainMod, A, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod_SHIFT, mouse:272, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

### WINDOWS AND WORKSPACES ###
windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

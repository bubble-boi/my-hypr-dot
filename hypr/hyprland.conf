# DISPLAY
source = $HOME/.config/hypr/hyprland/monitors-default.conf
source = $HOME/.config/hypr/hyprland/monitors-local.conf

# BLUR
source = $HOME/.config/hypr/hyprland/blur-default.conf

# PROGRAM
$terminal = kitty
$fileManager =
$lock = hyprlock
$launcher = wofi-launcher
$clipboard = wofi-clipboard
$tool = wofi-tools
$powerprofilesctl = wofi-powerprofilesctl

# AUTOSTART
exec-once = fcitx5 -d &
exec-once = hyprpaper &
exec-once = waybar &
exec-once = hypridle &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular

# ENVIRONMENT VARIABLES
env = PATH,$HOME/.local/bin:$HOME/.local/bin/my-hypr-bin:/usr/local/bin:/usr/bin

# LOOK AND FEEL
source = $HOME/.config/hypr/hyprland/LnF-default.conf

# INPUT
source = $HOME/.config/hypr/hyprland/input-default.conf

# KEYBINDINGS
source = $HOME/.config/hypr/hyprland/keybinding-default.conf
